version: "2"

# This project intentionally runs with `linters.default: all` (every
# available golangci-lint linter) so that new bug/security/quality
# categories added upstream are picked up automatically. The linters
# disabled below are not being ignored for laziness — each one either
# fights an idiomatic, standard-library-sanctioned Go pattern used
# throughout this codebase, or is structurally unable to produce a useful
# signal here. See the comment above each entry.
linters:
  default: all
  disable:
    # depguard defaults to deny-everything-not-explicitly-allowlisted, so
    # with zero config it flags every import in the project, including our
    # own internal packages (service/api, service/db) and the standard
    # library. Maintaining a full import allowlist for a project this size
    # would be pure busywork with no bug-catching value.
    - depguard

    # exhaustruct demands every zero-value field be spelled out on every
    # struct literal, including third-party/stdlib structs (e.g. it wants
    # http.Client{Transport: nil, CheckRedirect: nil, Jar: nil, ...}). That
    # produces noise, not safety, for structs that are meant to be
    # constructed with sane zero-value defaults.
    - exhaustruct

    # gochecknoglobals flags any package-level variable, including
    # read-only lookup tables (e.g. the photo-extension allowlist in
    # service/api/utils.go) that are never mutated after init. It can't
    # distinguish that from genuine mutable global state.
    - gochecknoglobals

    # nlreturn requires a blank line before every return statement
    # (100+ findings here). It's a pure whitespace preference that fights
    # the compact, straight-line style used throughout this codebase and
    # gofmt does not enforce.
    - nlreturn

    # noinlineerr disallows `if err := f(); err != nil { ... }`, one of the
    # most standard idioms in Go (used throughout the standard library
    # itself). Disabling it would mean abandoning a core language idiom.
    - noinlineerr

    # varnamelen flags short identifiers like w/r (http.ResponseWriter/
    # *http.Request, the idiomatic names used by every Go HTTP tutorial and
    # the stdlib's own examples), db, id, ps. These are standard,
    # unambiguous names in their scope.
    - varnamelen

    # wsl/wsl_v5 enforce a specific statement-cuddling/whitespace style
    # (200+ combined findings here) that conflicts with this codebase's
    # existing formatting and gofmt does not require.
    - wsl
    - wsl_v5
  settings:
    cyclop:
      # HTTP handlers legitimately branch on many status codes (400/401/
      # 403/404/409/500 per failure mode) — that's requirement #10
      # (correct status code per error path), not accidental complexity.
      # Default 10 was hit by a handful of handlers after extracting all
      # the shared helpers that made sense without hurting readability;
      # 15 accommodates that without encouraging real complexity growth.
      max-complexity: 15
