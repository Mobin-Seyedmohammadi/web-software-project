services:
  # Go Backend API Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3000:3000"
    # Single volume covering /data (DB file + the photos/ subdirectory).
    # Do NOT also mount a second volume at /data/photos: nesting two
    # separately-initialized named volumes under the same path tree isn't
    # guaranteed consistent ownership/permissions across Docker hosts and
    # storage drivers, and was the root cause of a "failed to ping
    # database: ... out of memory (14)" (really SQLITE_CANTOPEN) failure
    # that only reproduced on one deployment target.
    volumes:
      - wasatext-data:/data
    environment:
      - PORT=3000
      - DB_PATH=/data/wasatext.db
      - PHOTOS_DIR=/data/photos
    restart: unless-stopped

  # Frontend (Vue.js served by nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  wasatext-data:
